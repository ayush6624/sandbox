# Provisioned by control-install.sh. Loads every dashboard JSON under the path
# below on startup (and reloads on change). foldersFromFilesStructure keeps the
# single "sandbox" folder flat.
apiVersion: 1

providers:
  - name: sandbox
    orgId: 1
    folder: Sandbox
    type: file
    disableDeletion: false
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
